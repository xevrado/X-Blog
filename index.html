<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X Blog</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="logo.png" alt="X Blog Logo" class="logo-img">
                    <span>X Blog</span>
                </div>
            </div>


            <nav class="nav-menu">
                <ul class="nav-list">
                    <li class="nav-item active">
                        <a href="#" class="nav-link">
                            <i class='bx bx-file-blank'></i>
                            <span>Bloglar</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1>Blog Yazıları</h1>
                <p>Güncel blog yazılarını burada bulabilirsiniz.</p>
            </header>

            <div class="search-container main-search">
                <i class='bx bx-search'></i>
                <input type="text" id="searchInput" placeholder="Yazılarda ara...">
            </div>

            <div class="blogs-grid" id="blogsGrid">
                <!-- Blogs will be injected here by JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>
